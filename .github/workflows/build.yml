name: Windows x64 Build (CMake + vcpkg manifest)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # CLEAN BUILD (fix cache errors)
    # =========================
    - name: Clean build directory
      shell: pwsh
      run: |
        if (Test-Path build) { Remove-Item build -Recurse -Force }

    # =========================
    # MSVC x64 environment
    # =========================
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # =========================
    # Install CMake
    # =========================
    - name: Setup CMake
      uses: lukka/get-cmake@latest

    # =========================
    # CLONE VCPKG (IMPORTANT FIX)
    # =========================
    - name: Clone vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat

    # =========================
    # CONFIGURE + AUTO-INSTALL VIA MANIFEST
    # =========================
    - name: Configure CMake (vcpkg manifest mode)
      shell: pwsh
      run: |
        cmake -S . -B build -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DVCPKG_MANIFEST_MODE=ON `
          -DVCPKG_MANIFEST_INSTALL=ON

    # =========================
    # BUILD
    # =========================
    - name: Build project
      shell: pwsh
      run: |
        cmake --build build --config Release

    # =========================
    # COLLECT OUTPUT
    # =========================
    - name: Collect artifacts
      shell: pwsh
      run: |
        mkdir out
        Copy-Item build\Release\*.exe out\

    # =========================
    # UPLOAD ARTIFACT
    # =========================
    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: Lonkstalk-windows-x64
        path: out/*